{% set name = "flake8-annotations" %}
{% set version = "3.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/flake8_annotations-{{ version }}.tar.gz
  sha256: 71b52ec85a4ec82a10edfad497fe2b390609c95b2ad7d61cc94704bc88a498a0

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - poetry-core >=1.2
    - pip
  run:
    - python >={{ python_min }},<4.0.0
    - attrs >=21.4
    - flake8 >=5.0

test:
  imports:
    - flake8_annotations
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/sco1/flake8-annotations
  summary: Flake8 Type Annotation Checks
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - apmorton
    - muyajil
